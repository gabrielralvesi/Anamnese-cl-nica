<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agendar Avaliação | Gabriel Alves</title>
  <meta name="theme-color" content="#0E1A1F" />
  <style>
    :root{
      --bg:#070A0D; --bg2:#0B1116; --line:rgba(255,255,255,.08);
      --text:#ECF2F8; --muted:rgba(236,242,248,.72);
      --gold:#D6B46C; --gold2:#B48A3D;
      --shadow: 0 18px 60px rgba(0,0,0,.55); --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(214,180,108,.10), transparent 55%),
        radial-gradient(1000px 500px at 80% 10%, rgba(44,122,90,.12), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color:var(--text);
    }
    .wrap{max-width:980px; margin:auto; padding:26px 18px 70px}
    a{color:inherit; text-decoration:none}
    .panel{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background: rgba(15,23,32,.66);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding:22px;
    }
    .top{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px}
    .brand{display:flex; align-items:center; gap:12px}
    .brand img{width:44px; height:44px; object-fit:contain; border-radius:12px; background:rgba(255,255,255,.06); border:1px solid var(--line); padding:6px;}
    h1{margin:10px 0 0; font-size:24px}
    .sub{margin:8px 0 0; color:var(--muted); line-height:1.6}
    .grid{display:grid; gap:12px; grid-template-columns:1fr 1fr}
    @media(max-width:820px){ .grid{grid-template-columns:1fr} }

    label{display:block; font-weight:900; font-size:13px; margin:8px 0 6px}
    input, select, textarea{
      width:100%; padding:12px 12px; border-radius:14px;
      border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--text);
      outline:none; font-size:14px;
    }
    textarea{min-height:100px; resize:vertical}
    .btns{display:flex; gap:12px; flex-wrap:wrap; margin-top:14px}
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      padding:13px 16px; border-radius:14px; border:1px solid var(--line);
      background:rgba(255,255,255,.03); font-weight:900; transition:.25s;
    }
    .btn:hover{transform:translateY(-1px); border-color:rgba(214,180,108,.35)}
    .btn.primary{background:linear-gradient(135deg, rgba(214,180,108,.95), rgba(180,138,61,.95)); color:#111; border-color:rgba(214,180,108,.35);}
    .hint{color:var(--muted); font-size:12px; margin-top:8px}
    .pill{border:1px solid rgba(214,180,108,.35); background:rgba(214,180,108,.10); padding:10px 12px; border-radius:999px; font-weight:900; font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="top">
        <div class="brand">
          <img src="logo.png" alt="Logo">
          <div>
            <div class="pill">Agendamento</div>
            <h1>Agendar avaliação</h1>
          </div>
        </div>
        <a class="btn" href="index.html">Voltar</a>
      </div>

      <p class="sub">Preencha e clique em <strong>Enviar no WhatsApp</strong>. A mensagem já vai completa.</p>

      <form id="f">
        <div class="grid">
          <div>
            <label>Nome do responsável</label>
            <input name="resp" required placeholder="Ex.: Maria" />
          </div>
          <div>
            <label>Nome da criança</label>
            <input name="crianca" required placeholder="Ex.: João" />
          </div>
          <div>
            <label>Idade</label>
            <input name="idade" required placeholder="Ex.: 3 anos / 3 meses" />
          </div>
          <div>
            <label>Preferência de período</label>
            <select name="periodo" required>
              <option value="" selected>Selecione</option>
              <option>Manhã</option>
              <option>Tarde</option>
              <option>Noite</option>
              <option>Indiferente</option>
            </select>
          </div>
          <div>
            <label>Dias possíveis</label>
            <input name="dias" placeholder="Ex.: seg/qua/sex" />
          </div>
          <div>
            <label>Horário aproximado</label>
            <input name="hora" placeholder="Ex.: 14h–16h" />
          </div>
        </div>

        <label>Queixa principal</label>
        <textarea name="queixa" required placeholder="Ex.: atraso de fala, troca de sons, seletividade alimentar, etc."></textarea>

        <div class="btns">
          <button class="btn primary" type="submit">Enviar no WhatsApp</button>
          <button class="btn" type="button" onclick="document.getElementById('f').reset()">Limpar</button>
          <a class="btn" href="adm.html">Área ADM</a>
        </div>

        <div class="hint">Ao enviar, você será redirecionado para o WhatsApp com a mensagem pronta.</div>
      </form>
    </div>
  </div>

  <script>
    const WHATS_NUMBER = "5567992318379";
    const form = document.getElementById("f");
    form.addEventListener("submit", (e)=>{
      e.preventDefault();
      const fd = new FormData(form);
      const data = Object.fromEntries(fd.entries());

      const msg =
`Olá, Gabriel! Gostaria de agendar uma avaliação fonoaudiológica.

Responsável: ${data.resp}
Criança: ${data.crianca}
Idade: ${data.idade}

Queixa principal: ${data.queixa}

Disponibilidade:
- Período: ${data.periodo}
- Dias: ${data.dias || "—"}
- Horário: ${data.hora || "—"}
`;
      const link = `https://wa.me/${WHATS_NUMBER}?text=${encodeURIComponent(msg)}`;
      window.open(link, "_blank");
    });
  </script>
</body>
</html>
